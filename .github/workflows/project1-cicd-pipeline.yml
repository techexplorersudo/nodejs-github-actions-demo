# ============================================================
# GH-200 Study — Project 1: CI/CD Pipeline with Matrix Strategy
# ============================================================
# Concepts demonstrated (Days 1, 2, 4):
#   - Workflow events & triggers (push, pull_request, workflow_dispatch)
#   - Matrix strategy (multi Node.js version testing)
#   - Job dependencies (needs:)
#   - Environment variables and contexts
#   - Caching with actions/cache@v4
#   - Artifacts (upload & download)
#   - Conditional steps (if:)
#   - Step outputs via $GITHUB_OUTPUT
#   - Job summary via $GITHUB_STEP_SUMMARY
# ============================================================

name: "Project 1 – CI/CD Pipeline"

# ── Triggers ────────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths:
      - "**.js"
      - "package*.json"
      - ".github/workflows/project1-cicd-pipeline.yml"
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      run-lint:
        description: "Run linting step?"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

# ── Default permissions (least privilege) ───────────────────
permissions:
  contents: read

# ── Concurrency: cancel in-progress runs on the same branch ─
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ============================================================
# JOB 1: Build & Test (matrix across Node.js versions)
# ============================================================
jobs:
  build-and-test:
    name: "Build & Test (Node ${{ matrix.node-version }})"
    runs-on: ubuntu-latest

    # Matrix strategy: run job for each Node.js version
    strategy:
      fail-fast: false                 # don't cancel others if one fails
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      # ── 1. Check out source code ──────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Cache npm packages ─────────────────────────────
      # Key includes OS + hash of lock file so cache is invalidated
      # when dependencies change.
      - name: Cache npm packages
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-${{ matrix.node-version }}-
            ${{ runner.os }}-npm-

      # ── 3. Set up Node.js ─────────────────────────────────
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # ── 4. Install dependencies (exact versions from lock) ─
      - name: Install dependencies
        run: npm ci

      # ── 5. Optional lint step (controlled by workflow_dispatch input)
      - name: Lint (optional)
        if: ${{ github.event.inputs.run-lint == 'true' || github.event_name != 'workflow_dispatch' }}
        run: |
          # Placeholder: replace with your linter (e.g. npx eslint .)
          echo "Linting skipped — no linter configured yet"

      # ── 6. Run tests & capture result ─────────────────────
      - name: Run tests
        id: run-tests
        run: |
          npm test
          echo "test-result=passed" >> $GITHUB_OUTPUT

      # ── 7. Upload test results as an artifact ─────────────
      - name: Upload test results
        if: always()          # upload even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node${{ matrix.node-version }}
          path: |
            coverage/
            junit.xml
          retention-days: 5
          if-no-files-found: ignore   # don't fail if no coverage files

      # ── 8. Write a job summary ────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          echo "## Test Results — Node ${{ matrix.node-version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Node version | ${{ matrix.node-version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Runner OS | ${{ runner.os }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cache hit | ${{ steps.npm-cache.outputs.cache-hit }} |" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # JOB 2: Build summary (runs after all matrix jobs complete)
  # ============================================================
  summarize:
    name: "Summarize Results"
    runs-on: ubuntu-latest
    needs: build-and-test            # waits for ALL matrix jobs
    if: always()                     # run even if matrix jobs fail

    steps:
      # ── Download all test result artifacts ─────────────────
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-results/
          pattern: "test-results-*"
          merge-multiple: false

      # ── Print summary ──────────────────────────────────────
      - name: Print summary
        run: |
          echo "## CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All matrix jobs completed. Result: **${{ needs.build-and-test.result }}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Artifacts downloaded to: all-results/" >> $GITHUB_STEP_SUMMARY
          ls all-results/ 2>/dev/null || echo "No artifacts found (coverage disabled)."
